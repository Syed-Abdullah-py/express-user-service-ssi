<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSI-User-Mgmt — Edit User</title>
  <link rel="icon" href="/assets/ssi-logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="/" class="brand">
          <img src="/assets/ssi-logo.jpg" alt="SSI" class="brand-logo" />
          <span class="brand-name">SSI-User-Mgmt</span>
        </a>
        <nav class="nav">
          <a href="/" class="nav-link">Create</a>
          <a href="/users.html" class="nav-link">Users</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1>Edit user</h1>
        <p>Update the details for this account.</p>
      </div>

      <div class="card">
        <div id="loading" class="loading-state">
          <div class="spinner"></div>
          <span>Loading user…</span>
        </div>
        <div id="error" class="error-state" hidden></div>

        <div id="editContent" class="card-body" hidden>
          <div id="errorAlert" class="alert alert-error" hidden></div>

          <form id="editForm" method="POST">
            <input type="hidden" name="_method" value="PUT" />
            <div class="form-group">
              <label for="name">Full name</label>
              <input type="text" id="name" name="name" autocomplete="name" required />
            </div>

            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" name="email" autocomplete="email" required />
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span id="btnText">Save changes</span>
            </button>
          </form>
        </div>

        <div id="editFooter" class="card-footer" hidden>Changes are saved to the database immediately.</div>
      </div>

      <div class="actions" id="backActions" hidden>
        <a href="#" id="backLink" class="btn btn-secondary">&larr; Back to profile</a>
      </div>
    </main>

    <footer class="page-footer">SSI Decisions · User Management</footer>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const userId = App.getQueryParam('id');

    async function loadUser() {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const editContent = document.getElementById('editContent');
      const editFooter = document.getElementById('editFooter');
      const backActions = document.getElementById('backActions');

      if (!userId) {
        loading.hidden = true;
        errorEl.textContent = 'No user ID provided';
        errorEl.hidden = false;
        return;
      }

      document.getElementById('backLink').href = `/user.html?id=${userId}`;

      try {
        const res = await fetch(`/api/users/${userId}`);
        const user = await res.json();

        loading.hidden = true;

        if (!res.ok) {
          errorEl.textContent = user.error || 'User not found';
          errorEl.hidden = false;
          return;
        }

        document.title = `Edit ${user.name} · SSI-User-Mgmt`;
        document.getElementById('name').value = user.name;
        document.getElementById('email').value = user.email;
        document.getElementById('editForm').action = `/users/${userId}`;

        App.showErrorFromQuery('errorAlert', `/edit.html?id=${userId}`);

        editContent.hidden = false;
        editFooter.hidden = false;
        backActions.hidden = false;
      } catch {
        loading.hidden = true;
        errorEl.textContent = 'Could not connect to the server';
        errorEl.hidden = false;
      }
    }

    App.setSubmitLoading('editForm', 'submitBtn', 'btnText', 'Saving…');
    loadUser();
  </script>
</body>
</html>
