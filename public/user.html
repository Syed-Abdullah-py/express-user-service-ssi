<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSI-User-Mgmt — User Details</title>
  <link rel="icon" href="/assets/ssi-logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="/" class="brand">
          <img src="/assets/ssi-logo.jpg" alt="SSI" class="brand-logo" />
          <span class="brand-name">SSI-User-Mgmt</span>
        </a>
        <nav class="nav">
          <a href="/" class="nav-link">Create</a>
          <a href="/users.html" class="nav-link">Users</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1>User profile</h1>
        <p>Detailed information for this account.</p>
      </div>

      <div class="card">
        <div id="loading" class="loading-state">
          <div class="spinner"></div>
          <span>Loading profile…</span>
        </div>
        <div id="error" class="error-state" hidden></div>
        <div id="userDetail" hidden>
          <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar"></div>
            <div>
              <div class="profile-name" id="profileName"></div>
              <div class="profile-email" id="profileEmail"></div>
            </div>
          </div>
          <div class="detail-grid">
            <div class="detail-row">
              <span class="detail-label">Full name</span>
              <span class="detail-value" id="userName"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Email</span>
              <span class="detail-value" id="userEmail"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Member since</span>
              <span class="detail-value" id="userCreated"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">User ID</span>
              <span class="detail-value" id="userId"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="actions">
        <a href="/users.html" class="btn btn-secondary">&larr; All users</a>
        <a href="/" class="btn btn-secondary">Create another</a>
      </div>
    </main>

    <footer class="page-footer">SSI Decisions · User Management</footer>
  </div>

  <script>
    const userId = new URLSearchParams(window.location.search).get('id');

    function getInitials(name) {
      return name
        .split(' ')
        .map((w) => w[0])
        .slice(0, 2)
        .join('')
        .toUpperCase();
    }

    function formatDate(dateStr) {
      return new Date(dateStr).toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
      });
    }

    async function loadUser() {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const detail = document.getElementById('userDetail');

      if (!userId) {
        loading.hidden = true;
        errorEl.textContent = 'No user ID provided';
        errorEl.hidden = false;
        return;
      }

      try {
        const res = await fetch(`/api/users/${userId}`);
        const user = await res.json();

        loading.hidden = true;

        if (!res.ok) {
          errorEl.textContent = user.error || 'User not found';
          errorEl.hidden = false;
          return;
        }

        document.title = `${user.name} · SSI-User-Mgmt`;
        document.getElementById('profileAvatar').textContent = getInitials(user.name);
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userCreated').textContent = formatDate(user.createdAt);
        document.getElementById('userId').textContent = `#${user.id}`;
        detail.hidden = false;
      } catch {
        loading.hidden = true;
        errorEl.textContent = 'Could not connect to the server';
        errorEl.hidden = false;
      }
    }

    loadUser();
  </script>
</body>
</html>
