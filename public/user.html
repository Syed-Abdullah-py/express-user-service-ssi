<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSI-User-Mgmt — User Details</title>
  <link rel="icon" href="/assets/ssi-logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="/" class="brand">
          <img src="/assets/ssi-logo.jpg" alt="SSI" class="brand-logo" />
          <span class="brand-name">SSI-User-Mgmt</span>
        </a>
        <nav class="nav">
          <a href="/" class="nav-link">Create</a>
          <a href="/users.html" class="nav-link">Users</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1>User profile</h1>
        <p>Detailed information for this account.</p>
      </div>

      <div id="errorToast" class="alert alert-error" hidden></div>

      <div id="successToast" class="toast" hidden>
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        User updated successfully.
      </div>

      <div class="card">
        <div id="loading" class="loading-state">
          <div class="spinner"></div>
          <span>Loading profile…</span>
        </div>
        <div id="error" class="error-state" hidden></div>
        <div id="userDetail" hidden>
          <div class="profile-header">
            <div class="profile-avatar" id="profileAvatar"></div>
            <div>
              <div class="profile-name" id="profileName"></div>
              <div class="profile-email" id="profileEmail"></div>
            </div>
          </div>
          <div class="detail-grid">
            <div class="detail-row">
              <span class="detail-label">Full name</span>
              <span class="detail-value" id="userName"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Email</span>
              <span class="detail-value" id="userEmail"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Member since</span>
              <span class="detail-value" id="userCreated"></span>
            </div>
            <div class="detail-row">
              <span class="detail-label">User ID</span>
              <span class="detail-value uuid-value" id="userId"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="actions">
        <a href="/users.html" class="btn btn-secondary">&larr; All users</a>
        <a href="#" id="editLink" class="btn btn-secondary">Edit user</a>
        <a href="/" class="btn btn-secondary">Create another</a>
      </div>

      <div class="actions actions-danger" id="deleteSection" hidden>
        <form id="deleteForm" action="" method="POST">
          <button type="submit" class="btn-danger">Delete user</button>
        </form>
      </div>
    </main>

    <footer class="page-footer">SSI Decisions · User Management</footer>
  </div>

  <script src="/js/common.js"></script>
  <script>
    const userId = App.getQueryParam('id');

    if (App.getQueryParam('updated') === '1') {
      document.getElementById('successToast').hidden = false;
      history.replaceState({}, '', `/user.html?id=${userId}`);
    }

    App.showErrorFromQuery('errorToast', `/user.html?id=${userId}`);

    if (userId) {
      document.getElementById('editLink').href = `/edit.html?id=${userId}`;
      document.getElementById('deleteForm').action = `/users/${userId}/delete`;
    }

    document.getElementById('deleteForm').addEventListener('submit', (e) => {
      const name = document.getElementById('profileName').textContent;
      if (!App.confirmDelete(name || 'this user')) e.preventDefault();
    });

    async function loadUser() {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const detail = document.getElementById('userDetail');

      if (!userId) {
        loading.hidden = true;
        errorEl.textContent = 'No user ID provided';
        errorEl.hidden = false;
        return;
      }

      try {
        const res = await fetch(`/api/users/${userId}`);
        const user = await res.json();

        loading.hidden = true;

        if (!res.ok) {
          errorEl.textContent = user.error || 'User not found';
          errorEl.hidden = false;
          return;
        }

        document.title = `${user.name} · SSI-User-Mgmt`;
        document.getElementById('profileAvatar').innerHTML = App.personIcon(34);
        document.getElementById('profileName').textContent = user.name;
        document.getElementById('profileEmail').textContent = user.email;
        document.getElementById('userName').textContent = user.name;
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userCreated').textContent = App.formatDate(user.createdAt);
        document.getElementById('userId').textContent = user.id;
        detail.hidden = false;
        document.getElementById('deleteSection').hidden = false;
      } catch {
        loading.hidden = true;
        errorEl.textContent = 'Could not connect to the server';
        errorEl.hidden = false;
      }
    }

    loadUser();
  </script>
</body>
</html>
