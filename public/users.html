<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSI-User-Mgmt — Users</title>
  <link rel="icon" href="/assets/ssi-logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="/" class="brand">
          <img src="/assets/ssi-logo.jpg" alt="SSI" class="brand-logo" />
          <span class="brand-name">SSI-User-Mgmt</span>
        </a>
        <nav class="nav">
          <a href="/" class="nav-link">Create</a>
          <a href="/users.html" class="nav-link active">Users</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1>All users</h1>
        <p>Browse and view registered users.</p>
        <div id="userCount" class="page-meta" hidden></div>
      </div>

      <div id="successToast" class="toast" hidden>
        <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        User created successfully.
      </div>

      <div class="card">
        <div id="loading" class="loading-state">
          <div class="spinner"></div>
          <span>Loading users…</span>
        </div>
        <div id="error" class="error-state" hidden></div>
        <div id="usersList" class="user-list" hidden></div>
        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            </svg>
          </div>
          <h3>No users yet</h3>
          <p>Get started by creating your first user.</p>
          <a href="/" class="btn btn-secondary btn-sm">Create user</a>
        </div>
      </div>
    </main>

    <footer class="page-footer">SSI Decisions · User Management</footer>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get('created') === '1') {
      document.getElementById('successToast').hidden = false;
      history.replaceState({}, '', '/users.html');
    }

    function getInitials(name) {
      return name
        .split(' ')
        .map((w) => w[0])
        .slice(0, 2)
        .join('')
        .toUpperCase();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadUsers() {
      const loading = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const list = document.getElementById('usersList');
      const empty = document.getElementById('emptyState');
      const countEl = document.getElementById('userCount');

      try {
        const res = await fetch('/api/users');
        const data = await res.json();

        loading.hidden = true;

        if (!res.ok) {
          errorEl.textContent = data.error || 'Failed to load users';
          errorEl.hidden = false;
          return;
        }

        if (data.length === 0) {
          empty.hidden = false;
          return;
        }

        countEl.textContent = `${data.length} user${data.length === 1 ? '' : 's'}`;
        countEl.hidden = false;
        list.hidden = false;

        data.forEach((user) => {
          const li = document.createElement('a');
          li.className = 'user-item';
          li.href = `/user.html?id=${user.id}`;
          li.innerHTML = `
            <div class="avatar">${escapeHtml(getInitials(user.name))}</div>
            <div class="user-info">
              <h3>${escapeHtml(user.name)}</h3>
              <p>${escapeHtml(user.email)}</p>
            </div>
            <svg class="user-arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          `;
          list.appendChild(li);
        });
      } catch {
        loading.hidden = true;
        errorEl.textContent = 'Could not connect to the server';
        errorEl.hidden = false;
      }
    }

    loadUsers();
  </script>
</body>
</html>
