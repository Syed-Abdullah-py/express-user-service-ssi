<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSI-User-Mgmt — Create User</title>
  <link rel="icon" href="/assets/ssi-logo.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="/" class="brand">
          <img src="/assets/ssi-logo.jpg" alt="SSI" class="brand-logo" />
          <span class="brand-name">SSI-User-Mgmt</span>
        </a>
        <nav class="nav">
          <a href="/" class="nav-link active">Create</a>
          <a href="/users.html" class="nav-link">Users</a>
        </nav>
      </div>
    </header>

    <main class="main">
      <div class="page-header">
        <h1>Create a user</h1>
        <p>Fill in the details below to add someone new.</p>
      </div>

      <div class="card">
        <div class="card-body">
          <div id="errorAlert" class="alert alert-error" hidden></div>

          <form id="createForm" action="/users" method="POST">
            <div class="form-group">
              <label for="name">Full name</label>
              <input type="text" id="name" name="name" placeholder="e.g. Syed Abdullah" autocomplete="name" required />
            </div>

            <div class="form-group">
              <label for="email">Email address</label>
              <input type="email" id="email" name="email" placeholder="e.g. s.abdullah@ssidecisions.com" autocomplete="email" required />
            </div>

            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span id="btnText">Create user</span>
            </button>
          </form>
        </div>
        <div class="card-footer">All fields are required. Email must be unique.</div>
      </div>
    </main>

    <footer class="page-footer">SSI Decisions · User Management</footer>
  </div>

  <script src="/js/common.js"></script>
  <script>
    App.showErrorFromQuery('errorAlert', '/');
    App.setSubmitLoading('createForm', 'submitBtn', 'btnText', 'Creating…');
  </script>
</body>
</html>
